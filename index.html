<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>    <input id="url">
<button onclick="sendUrl()">Send</button>
    <img id="thumb" width="300">
<h2 id="title"></h2>
<p id="channel"></p>
<p id="duration"></p>
<p id="views"></p>
<p id="uploadDate"></p>
<script>
async function sendUrl() {

    const url =
        document.getElementById("url").value;

    const response = await fetch(
        "http://localhost:3000/metadata",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                url: url
            })
        }
    );

    const data = await response.json();

document.getElementById("thumb").src =
    data.thumbnail;
document.getElementById("thumb").style.display = "block";
document.getElementById("thumb").style.paddingTop = "10px";

document.getElementById("title").innerText =
    data.title;

document.getElementById("channel").innerText =
    `Channel: ${data.channel}`;

document.getElementById("duration").innerText =
    `Duration: ${data.duration} sec`;

document.getElementById("views").innerText =
    `Views: ${data.views.toLocaleString()}`;

const date = data.uploadDate;

const formattedDate =
    `${date.slice(6, 8)}-${date.slice(4, 6)}-${date.slice(0, 4)}`;

document.getElementById("uploadDate").innerText =
    `Uploaded: ${formattedDate}`;
}
</script>

</body>
</html>
